<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Finanzas</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-icon" aria-hidden="true">💰</span>
          <span class="brand-name">Mis Finanzas</span>
        </div>
        <div id="header-meta" class="header-meta"></div>
      </div>
    </header>

    <nav class="main-nav" id="main-nav" role="tablist" aria-label="Navegación principal"></nav>

    <main class="main-content">
      <section class="tab-panel active" data-panel="summary"  id="panel-summary"  role="tabpanel"></section>
      <section class="tab-panel"        data-panel="income"   id="panel-income"   role="tabpanel"></section>
      <section class="tab-panel"        data-panel="expenses" id="panel-expenses" role="tabpanel"></section>
      <section class="tab-panel"        data-panel="debts"    id="panel-debts"    role="tabpanel"></section>
      <section class="tab-panel"        data-panel="business" id="panel-business" role="tabpanel"></section>
      <section class="tab-panel"        data-panel="savings"  id="panel-savings"  role="tabpanel"></section>
      <section class="tab-panel"        data-panel="settings" id="panel-settings" role="tabpanel"></section>
    </main>

    <footer class="app-footer">
      <a href="https://www.instagram.com/henryrivas.ads/" target="_blank" rel="noopener noreferrer" class="footer-link">@henryrivas.ads</a>
      <span class="footer-author">Henry Rivas</span>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
